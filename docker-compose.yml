services:
  postgres:
    image: postgres:16-alpine
    container_name: rtms-postgres
    environment:
      POSTGRES_USER: mmi
      POSTGRES_PASSWORD: '@Miyazaki2271'
      POSTGRES_DB: mmi_scada
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: rtms-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rtms-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  redis_data:
