# Mosquitto 設定ファイル

# リスナー設定
listener 1883
protocol mqtt

# WebSocket リスナー
listener 9001
protocol websockets

# 匿名接続を許可（開発環境用）
allow_anonymous true

# ログ設定
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# 永続化設定
persistence true
persistence_location /mosquitto/data/

# 接続設定
max_connections -1
